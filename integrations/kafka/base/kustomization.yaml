---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/knative/eventing/releases/download/knative-v1.15.0/eventing.yaml?timeout=90

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-br-defaults
        namespace: knative-eventing
      data:
        default-br-config: |
          clusterDefault:
          brokerClass: MTChannelBasedBroker
          apiVersion: v1
          kind: ConfigMap
          name: config-br-default-channel
          namespace: knative-eventing
          delivery:
            retry: 10
            backoffPolicy: exponential
            backoffDelay: PT0.2S
          namespaceDefaults:
            kubearchive:
              brokerClass: Kafka
              apiVersion: v1
              kind: ConfigMap
              name: kafka-broker-config
              namespace: knative-eventing
